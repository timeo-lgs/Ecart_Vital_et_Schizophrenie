<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Mémoire</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body>

    <button id="prev-btn" class="nav-btn left">❮</button>

    <div class="viewer-container">
        <div id="book-container">
            <canvas id="left-page"></canvas>
            <canvas id="right-page"></canvas>
        </div>
    </div>

    <button id="next-btn" class="nav-btn right">❯</button>

    <div class="page-info">
        <input type="number" id="page-num" value="1" min="1"> / <span id="page-count">--</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
